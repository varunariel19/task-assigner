@if (isOpen()) {
<div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50">

  <div class="bg-white w-[500px] rounded-2xl shadow-2xl p-6 animate-fade">

    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-semibold ">Create Ticket</h2>
      <button (click)="close()" class="text-gray-400 hover:text-black cursor-pointer">✕</button>
    </div>

    <app-create-ticket-form></app-create-ticket-form>

  </div>
</div>
}
